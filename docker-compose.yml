services:
  forwarder:
    build: .
    container_name: tg_forwarder
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./session:/session   # хранит файл сессии Telethon между перезапусками
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
